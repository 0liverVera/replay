<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$REPLAY — Signing In...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    .msg { font-size: 0.6rem; line-height: 2; color: #00d4ff; }
    .err { color: #ff0080; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s infinite; }
  </style>
</head>
<body>
  <div>
    <div class="msg" id="msg">
      <span class="blink">▌</span> LOGGING IN WITH X...
    </div>
  </div>

  <script>
  (function () {
    /* ---- Keep in sync with X_CONFIG.WORKER_URL in main.js ---- */
    var WORKER_URL = '';  // e.g. 'https://replay-auth.yourname.workers.dev'

    var msgEl   = document.getElementById('msg');
    var params  = new URLSearchParams(window.location.search);
    var code    = params.get('code');
    var state   = params.get('state');
    var error   = params.get('error');

    var returnUrl = sessionStorage.getItem('replay_return_url') || 'game.html';
    var verifier  = sessionStorage.getItem('replay_pkce_verifier');
    var savedState = sessionStorage.getItem('replay_oauth_state');

    function fail(reason) {
      msgEl.innerHTML = '<span class="err">LOGIN FAILED</span><br>' + (reason || '') + '<br><br>' +
        '<a href="game.html" style="color:#00d4ff;font-size:0.5rem">← BACK TO GAME</a>';
    }

    if (error) { fail('X denied access.'); return; }
    if (!code)  { fail('No auth code received.'); return; }
    if (!verifier) { fail('Session expired. Please try again.'); return; }
    if (state !== savedState) { fail('State mismatch. Please try again.'); return; }

    if (!WORKER_URL) {
      fail('Worker URL not configured. Check callback.html.');
      return;
    }

    // Exchange code via Cloudflare Worker (handles server-side token swap)
    var workerUrl = WORKER_URL.replace(/\/$/, '') + '/callback' +
      '?code='     + encodeURIComponent(code) +
      '&verifier=' + encodeURIComponent(verifier);

    fetch(workerUrl)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data || !data.username) { fail('Could not retrieve X profile.'); return; }

        localStorage.setItem('replay_x_user', JSON.stringify({
          id:                data.id,
          username:          data.username,
          name:              data.name,
          profile_image_url: data.profile_image_url || '',
        }));

        sessionStorage.removeItem('replay_pkce_verifier');
        sessionStorage.removeItem('replay_oauth_state');
        sessionStorage.removeItem('replay_return_url');

        window.location.replace(returnUrl);
      })
      .catch(function () {
        fail('Network error contacting auth server.');
      });
  })();
  </script>
</body>
</html>
